# Food Management System — production-style run (EC2, RDS, or local MySQL).
#
# 1. Copy deploy/env.production.example to .env and set DATABASE_URL to your RDS endpoint.
# 2. Open EC2 security group: inbound TCP 80 (or 3000) from 0.0.0.0/0 (or your IP).
# 3. RDS security group: inbound MySQL 3306 from the EC2 instance security group only.
# 4. From this directory: docker compose up -d --build
#
# Public URL: http://YOUR_EC2_PUBLIC_IP (if PUBLIC_PORT=80)

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_APP_ID: ${VITE_APP_ID:-}
    image: food-management-system:latest
    restart: unless-stopped
    ports:
      - "${PUBLIC_PORT:-80}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3000"
      # Number of proxy hops (ALB = 1, CloudFront+ALB = 2, etc.)
      TRUST_PROXY_HOPS: "${TRUST_PROXY_HOPS:-1}"
